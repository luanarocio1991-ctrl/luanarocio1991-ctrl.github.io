<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evento en vivo</title>

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

#player{
width:100%;
height:100vh;
border:none;
}

.loader{
position:absolute;
color:white;
font-size:18px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="loader">🎥 Cargando evento...</div>

<iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>

<script>

const params=new URLSearchParams(window.location.search);
let embed=params.get("r");

if(embed){

let url=atob(embed).trim();

/* corregir urls */

if(url.startsWith("//")){
url="https:"+url;
}

if(url.startsWith("/")){
url="https://la14hd.com"+url;
}

document.getElementById("player").src=url;

}

</script>

</body>
</html><!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cargando evento...</title>

<style>
body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

.loader{
border:5px solid #222;
border-top:5px solid #1f6feb;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin-top:20px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<h2>🎥 Cargando evento en vivo...</h2>
<div class="loader"></div>

<script>

const params = new URLSearchParams(window.location.search);
let embed = params.get("r");

if(embed){

let url = atob(embed).trim();

/* si el enlace ya tiene http lo usamos */

if(url.startsWith("http")){
window.location.href = url;
}

/* si empieza con / es un enlace relativo */

else if(url.startsWith("/")){
window.location.href = "https://la14hd.com" + url;
}

/* si no tiene nada */

else{
window.location.href = "https://" + url;
}

}

</script>

</body>
</html>
