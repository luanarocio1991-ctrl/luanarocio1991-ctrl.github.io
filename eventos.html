<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evento en vivo</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

#loader{
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
}

.loader{
border:5px solid #222;
border-top:5px solid #1f6feb;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin-top:20px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#player{
width:100%;
height:100vh;
border:none;
display:none;
}

</style>

<script>

/* bloquear popups */

window.open=function(){
return null;
};

</script>

</head>

<body>

<div id="loader">
<h2>🎥 Cargando evento en vivo...</h2>
<div class="loader"></div>
</div>

<iframe id="player"
allowfullscreen
sandbox="allow-scripts allow-same-origin allow-forms"
></iframe>

<script>

const params=new URLSearchParams(window.location.search);
let embed=params.get("r");

if(embed){

let url=atob(embed).trim();

/* corregir urls */

if(url.startsWith("//")){
url="https:"+url;
}

if(url.startsWith("/")){
url="https://la14hd.com"+url;
}

if(!url.startsWith("http")){
url="https://"+url;
}

/* cargar dentro del iframe */

setTimeout(()=>{

document.getElementById("player").src=url;
document.getElementById("player").style.display="block";
document.getElementById("loader").style.display="none";

},1200);

}

</script>

</body>
</html>
