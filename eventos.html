<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evento en vivo</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
}

#loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

.loader{
border:5px solid #222;
border-top:5px solid #1f6feb;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

iframe{
width:100%;
height:100vh;
border:none;
display:none;
}

</style>
</head>

<body>

<div id="loader">
<h2>🎥 Cargando evento en vivo...</h2>
<div class="loader"></div>
</div>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>

var params = new URLSearchParams(window.location.search);
var embed = params.get("r");

if(embed){

var decoded = atob(embed);

var iframe = document.getElementById("player");

setTimeout(function(){

iframe.src = decoded;
iframe.style.display = "block";
document.getElementById("loader").style.display = "none";

},1500);

}

</script>

</body>
</html>
