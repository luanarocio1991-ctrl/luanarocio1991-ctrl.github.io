<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Deportiva</title>

<style>

body{
font-family: Arial;
background:#f3f4f6;
padding:20px;
}

#agenda{
max-width:700px;
margin:auto;
background:white;
border-radius:8px;
overflow:hidden;
}

.partido{
padding:12px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.info{
display:flex;
gap:10px;
}

.hora{
font-weight:bold;
width:60px;
}

.links{
display:none;
padding:10px 20px;
background:#fafafa;
}

.links a{
display:block;
padding:6px;
text-decoration:none;
color:#2563eb;
}

</style>

</head>
<body>

<h2>Agenda Deportiva</h2>

<div id="agenda"></div>

<script>

function convertirHora(hora){

let date = new Date(hora);

return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

}

fetch("https://goolhd.com/agenda.json?v=1.03")
.then(res=>res.json())
.then(data=>{

let html="";

data.data.forEach((evento,i)=>{

let hora = evento.attributes.diary_hour.substring(0,5);
let descripcion = evento.attributes.diary_description;

html+=`

<div class="partido" onclick="toggle(${i})">

<div class="info">

<div class="hora">${hora}</div>

<div>${descripcion}</div>

</div>

<div class="links" id="links${i}">
`;

evento.attributes.embeds.data.forEach(embed=>{

if(embed){

html+=`

<a href="${embed.attributes.embed_iframe}" target="_blank">
▶ ${embed.attributes.embed_name}
</a>

`;

}

});

html+=`</div></div>`;

});

document.getElementById("agenda").innerHTML = html;

});

function toggle(id){

let el = document.getElementById("links"+id);

if(el.style.display=="block"){
el.style.display="none";
}else{
el.style.display="block";
}

}

</script>

</body>
</html>
--------------------------------------
<script>
document.addEventListener("DOMContentLoaded", function () {

    // 🔧 CONFIGURA AQUÍ
    // Horario original del listado (ejemplo: España = +1)
    const zonaOrigen = 1;

    // Horario destino
    // Perú / Colombia = -5
    const zonaDestino = -5;

    const diferencia = zonaDestino - zonaOrigen;

    document.querySelectorAll(".t").forEach(function(el) {

        const texto = el.textContent.trim();
        if(!texto.includes(":")) return;

        let [h, m] = texto.split(":").map(Number);

        h = h + diferencia;

        if (h < 0) h += 24;
        if (h >= 24) h -= 24;

        el.textContent =
            String(h).padStart(2, "0") + ":" +
            String(m).padStart(2, "0");

    });

});
</script>
