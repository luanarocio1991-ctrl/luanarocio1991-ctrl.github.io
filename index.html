<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda Deportiva</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

#agenda{
max-width:700px;
margin:auto;
background:white;
border-radius:8px;
overflow:hidden;
}

.partido{
display:flex;
gap:10px;
padding:10px;
border-bottom:1px solid #ddd;
}

.hora{
font-weight:bold;
width:60px;
}

</style>

</head>
<body>

<h2>Agenda Deportiva</h2>

<div id="agenda"></div>

<script>

fetch("https://goolhd.com/agenda.json?v=1.03")
.then(res => res.json())
.then(data => {

let html="";

data.data.forEach(evento=>{

html += `
<div class="partido">

<div class="hora">
${evento.attributes.diary_hour.substring(0,5)}
</div>

<div>
${evento.attributes.diary_description}
</div>

</div>
`;

});

document.getElementById("agenda").innerHTML = html;

});

</script>

</body>
</html>
--------------------------------------
<script>
document.addEventListener("DOMContentLoaded", function () {

    // 🔧 CONFIGURA AQUÍ
    // Horario original del listado (ejemplo: España = +1)
    const zonaOrigen = 1;

    // Horario destino
    // Perú / Colombia = -5
    const zonaDestino = -5;

    const diferencia = zonaDestino - zonaOrigen;

    document.querySelectorAll(".t").forEach(function(el) {

        const texto = el.textContent.trim();
        if(!texto.includes(":")) return;

        let [h, m] = texto.split(":").map(Number);

        h = h + diferencia;

        if (h < 0) h += 24;
        if (h >= 24) h -= 24;

        el.textContent =
            String(h).padStart(2, "0") + ":" +
            String(m).padStart(2, "0");

    });

});
</script>
