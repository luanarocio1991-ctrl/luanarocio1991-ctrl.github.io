<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Deportiva</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

#agenda{
max-width:800px;
margin:auto;
}

.partido{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.hora{
font-size:18px;
font-weight:bold;
color:#38bdf8;
}

.equipos{
font-size:16px;
}

.canal{
background:#22c55e;
padding:5px 10px;
border-radius:6px;
font-size:14px;
}

</style>

</head>
<body>

<h1>⚽ Agenda de Eventos Deportivos</h1>

<div id="agenda"></div>

<script>

fetch("agenda.json")
.then(res => res.json())
.then(data => {

let html="";

data.forEach(partido=>{

html+=`

<div class="partido">

<div class="hora">
${partido.hora}
</div>

<div class="equipos">
${partido.local} vs ${partido.visitante}
</div>

<div class="canal">
${partido.canal}
</div>

</div>

`;

});

document.getElementById("agenda").innerHTML=html;

});

</script>

</body>
</html>
--------------------------------------
<script>
document.addEventListener("DOMContentLoaded", function () {

    // 🔧 CONFIGURA AQUÍ
    // Horario original del listado (ejemplo: España = +1)
    const zonaOrigen = 1;

    // Horario destino
    // Perú / Colombia = -5
    const zonaDestino = -5;

    const diferencia = zonaDestino - zonaOrigen;

    document.querySelectorAll(".t").forEach(function(el) {

        const texto = el.textContent.trim();
        if(!texto.includes(":")) return;

        let [h, m] = texto.split(":").map(Number);

        h = h + diferencia;

        if (h < 0) h += 24;
        if (h >= 24) h -= 24;

        el.textContent =
            String(h).padStart(2, "0") + ":" +
            String(m).padStart(2, "0");

    });

});
</script>
