<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda Deportiva</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:#e5e7eb;
padding:20px;
}

.titulo{
text-align:center;
font-size:22px;
margin-bottom:20px;
}

#agenda{
max-width:750px;
margin:auto;
background:#1e293b;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.partido{
padding:14px;
border-bottom:1px solid #334155;
cursor:pointer;
transition:background .2s;
}

.partido:hover{
background:#334155;
}

.info{
display:flex;
align-items:center;
gap:10px;
}

.hora{
width:60px;
font-weight:bold;
color:#38bdf8;
}

.bandera{
width:22px;
height:22px;
border-radius:50%;
}

.descripcion{
font-weight:600;
}

.links{
display:none;
padding:10px 20px;
background:#020617;
}

.links a{
display:block;
background:#2563eb;
padding:8px;
margin:6px 0;
border-radius:6px;
color:white;
text-decoration:none;
font-size:14px;
}

.links a:hover{
background:#1d4ed8;
}

</style>

</head>
<body>

<div class="titulo">⚽ Agenda Deportiva</div>

<div id="agenda"></div>

<script>

const API="https://goolhd.com/agenda.json?v=1.03";

function convertirHora(utc){

let date = new Date(utc);

return date.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

}

function toggle(id){

let el=document.getElementById("links"+id);

if(el.style.display==="block"){
el.style.display="none";
}else{
el.style.display="block";
}

}

async function cargarAgenda(){

let res=await fetch(API);
let data=await res.json();

let html="";

data.data
.filter(e=>e.attributes.deportes.toLowerCase()=="futbol")
.sort((a,b)=>a.attributes.diary_hour.localeCompare(b.attributes.diary_hour))
.forEach((evento,i)=>{

let hora=convertirHora(evento.attributes.diary_hour);

let desc=evento.attributes.diary_description;

let bandera="https://img.goolhd.com/uploads/sin_imagen_d36205f0e8.png";

if(evento.attributes.country.data){
bandera="https://img.goolhd.com"+
evento.attributes.country.data.attributes.image.data.attributes.url;
}

html+=`

<div class="partido" onclick="toggle(${i})">

<div class="info">

<div class="hora">${hora}</div>

<img class="bandera" src="${bandera}">

<div class="descripcion">${desc}</div>

</div>

<div class="links" id="links${i}">
`;

evento.attributes.embeds.data.forEach(embed=>{

if(embed){

html+=`

<a href="${embed.attributes.embed_iframe}" target="_blank">
▶ ${embed.attributes.embed_name}
</a>

`;

}

});

html+=`</div></div>`;

});

document.getElementById("agenda").innerHTML=html;

}

cargarAgenda();

/* actualizar cada minuto */

setInterval(cargarAgenda,60000);

</script>

</body>
</html>
