<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Deportiva</title>

<style>

body{
font-family: Arial;
background:#f3f4f6;
padding:20px;
}

#agenda{
max-width:750px;
margin:auto;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.partido{
border-bottom:1px solid #eee;
cursor:pointer;
padding:12px;
transition:background 0.2s;
}

.partido:hover{
background:#f9fafb;
}

.info{
display:flex;
align-items:center;
gap:10px;
}

.hora{
font-weight:bold;
width:60px;
color:#111;
}

.bandera{
width:20px;
height:20px;
border-radius:50%;
}

.descripcion{
font-weight:600;
color:#333;
}

.links{
display:none;
padding:10px 20px;
background:#fafafa;
}

.links a{
display:block;
padding:8px;
margin:5px 0;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:5px;
font-size:14px;
}

.links a:hover{
background:#1d4ed8;
}

.titulo{
font-size:20px;
margin-bottom:15px;
text-align:center;
}

</style>

</head>
<body>

<div class="titulo">Agenda Deportiva</div>

<div id="agenda"></div>

<script>

fetch("https://goolhd.com/agenda.json?v=1.03")
.then(res=>res.json())
.then(data=>{

let html="";

data.data.forEach((evento,i)=>{

let hora = evento.attributes.diary_hour.substring(0,5);

let descripcion = evento.attributes.diary_description;

let bandera = "https://img.goolhd.com/uploads/sin_imagen_d36205f0e8.png";

if(evento.attributes.country.data){
bandera="https://img.goolhd.com"+evento.attributes.country.data.attributes.image.data.attributes.url;
}

html+=`

<div class="partido" onclick="toggle(${i})">

<div class="info">

<div class="hora">${hora}</div>

<img class="bandera" src="${bandera}">

<div class="descripcion">${descripcion}</div>

</div>

<div class="links" id="links${i}">
`;

evento.attributes.embeds.data.forEach(embed=>{

if(embed){

html+=`

<a href="${embed.attributes.embed_iframe}" target="_blank">
▶ ${embed.attributes.embed_name}
</a>

`;

}

});

html+=`</div></div>`;

});

document.getElementById("agenda").innerHTML = html;

});

function toggle(id){

let el=document.getElementById("links"+id);

if(el.style.display=="block"){
el.style.display="none";
}else{
el.style.display="block";
}

}

</script>

</body>
</html>
--------------------------------------
<script>
document.addEventListener("DOMContentLoaded", function () {

    // 🔧 CONFIGURA AQUÍ
    // Horario original del listado (ejemplo: España = +1)
    const zonaOrigen = 1;

    // Horario destino
    // Perú / Colombia = -5
    const zonaDestino = -5;

    const diferencia = zonaDestino - zonaOrigen;

    document.querySelectorAll(".t").forEach(function(el) {

        const texto = el.textContent.trim();
        if(!texto.includes(":")) return;

        let [h, m] = texto.split(":").map(Number);

        h = h + diferencia;

        if (h < 0) h += 24;
        if (h >= 24) h -= 24;

        el.textContent =
            String(h).padStart(2, "0") + ":" +
            String(m).padStart(2, "0");

    });

});
</script>
